<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found · Moth stations</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg: #151611;
      --ink: #f3ead7;
      --muted: #b8b09d;
      --line: #3c3a2d;
      --amber: #d7b56d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(680px, 100%);
      border-top: 1px solid var(--line);
      padding-top: 28px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 1.08rem;
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 10vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }
    a {
      color: var(--amber);
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Page not found.</h1>
    <p>This address is not part of the moth stations dashboard.</p>
    <a href="/">Return to the dashboard</a>
  </main>
</body>
</html>
