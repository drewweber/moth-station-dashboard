name: Check pull request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python
        run: python -m compileall -q mothdash

      - name: Validate configuration and empty-data render
        run: |
          python -m mothdash init-db
          python -m mothdash render
          test -s public/index.html
          test -s public/live.html
          test -s public/live-snapshot.json
