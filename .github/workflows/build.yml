name: Build and deploy dashboard

on:
  workflow_dispatch: {}
  schedule:
    # 14:15 UTC = 10:15 AM Eastern during daylight time.
    - cron: "15 14 * * *"
  push:
    branches: [main]
    paths:
      - "mothdash/**"
      - "stations.toml"
      - ".github/workflows/build.yml"

permissions:
  contents: read

concurrency:
  group: moth-station-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/mothdash.db
          key: mothdash-db-${{ github.run_id }}
          restore-keys: |
            mothdash-db-

      - name: Build dashboard
        run: python -m mothdash build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=moth-stations --commit-dirty=true
