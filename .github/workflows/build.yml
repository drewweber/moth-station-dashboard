name: Build and deploy dashboard

on:
  workflow_dispatch: {}
  schedule:
    # Runs four times daily so newly-uploaded iNaturalist observations get
    # picked up throughout the day, not just once. Times are UTC and assume
    # Eastern Daylight Time (UTC-4); during EST (UTC-5, roughly Nov-Mar)
    # each run will land an hour later than the label below.
    - cron: "0 4 * * *"   # 12:00 AM Eastern
    - cron: "0 6 * * *"   # 2:00 AM Eastern
    - cron: "0 13 * * *"  # 9:00 AM Eastern
    - cron: "0 16 * * *"  # 12:00 PM Eastern
  push:
    branches: [main]
    paths:
      - "mothdash/**"
      - "stations.toml"
      - ".github/workflows/build.yml"

permissions:
  contents: read

concurrency:
  group: moth-station-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/mothdash.db
          key: mothdash-db-${{ github.run_id }}
          restore-keys: |
            mothdash-db-

      - name: Build dashboard
        run: python -m mothdash build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=moth-stations --commit-dirty=true
