name: Build and deploy dashboard

on:
  workflow_dispatch: {}
  schedule:
    # Daily correctness backstop. The lightweight check-new workflow triggers
    # additional builds only when iNaturalist has new matching observations.
    - cron: "30 17 * * *" # 1:30 PM Eastern during daylight time
  push:
    branches: [main]
    paths:
      - "mothdash/**"
      - "stations.toml"
      - ".github/workflows/build.yml"
      - ".github/workflows/check-new.yml"

permissions:
  contents: read

concurrency:
  group: moth-station-dashboard
  cancel-in-progress: false

jobs:
  test-and-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python
        run: python -m compileall -q mothdash

      - name: Validate configuration and empty-data render
        run: |
          python -m mothdash init-db
          python -m mothdash render
          test -s public/index.html
          test -s public/live.html
          test -s public/forecast-validation.html
          test -s public/live-snapshot.json

  build-and-deploy:
    # Forks receive the validation job above, but never receive our iNaturalist
    # sync, Cloudflare credentials, or a Pages deployment attempt.
    if: github.repository == 'drewweber/moth-station-dashboard' && github.ref == 'refs/heads/main'
    needs: test-and-render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore database cache
        uses: actions/cache@v5
        with:
          path: data/mothdash.db
          key: mothdash-db-${{ github.run_id }}
          restore-keys: |
            mothdash-db-

      - name: Build dashboard
        run: python -m mothdash build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=moth-stations --commit-dirty=true
